  share_cnn_encoders: false
  rnd_cfg: null
  symmetry_cfg: null
  dagger_update_freq: 20
  priv_reg_coef_schedual:
  - 0.0
  - 0.1
  - 2000.0
  - 3000.0
policy:
  class_name: ActorCriticRMA
  init_noise_std: 1.0
  noise_std_type: scalar
  state_dependent_std: false
  actor_obs_normalization: {}
  critic_obs_normalization: {}
  actor_hidden_dims:
  - 512
  - 256
  - 128
  critic_hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  tanh_encoder_output: false
  scan_encoder_dims:
  - 512
  - 256
  - 128
  priv_encoder_dims: []
  actor:
    num_priv_explicit: 0
    num_priv_latent: 0
    num_prop: 48
    num_scan: 5760
    num_hist: 0
    class_name: Actor
estimator:
  num_priv_explicit: 0
  num_priv_latent: 0
  num_prop: 48
  num_scan: 5760
  num_hist: 0
  class_name: DefaultEstimator
  train_with_estimated_states: true
  learning_rate: 0.0001
  hidden_dims:
  - 128
  - 64
depth_encoder: null
