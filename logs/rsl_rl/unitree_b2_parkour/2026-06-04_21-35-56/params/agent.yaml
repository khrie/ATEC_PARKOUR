seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 50000
empirical_normalization: false
obs_groups: {}
clip_actions: null
check_for_nan: true
save_interval: 100
experiment_name: unitree_b2_parkour
run_name: ''
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: OnPolicyRunner
actor: {}
critic: {}
algorithm:
  class_name: PPOWithExtractor
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.0002
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.01
  desired_kl: 0.01
  max_grad_norm: 1.0
  optimizer: adam
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
